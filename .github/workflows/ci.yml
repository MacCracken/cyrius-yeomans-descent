name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # release.yml gates on this workflow via `uses: ./.github/workflows/ci.yml`.
  # GitHub Actions requires the called workflow to opt in via `workflow_call:`
  # — without this, the release-tag run trips on the CI-gate step.
  # Same pattern as agora 1.0.0's CI.
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep 'cyrius *= *"' cyrius.cyml 2>/dev/null | head -1 | sed 's/.*"\(.*\)"/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve dependencies
        run: cyrius deps

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/${{ github.event.repository.name }}

      - name: Test
        # Cyrius 6.0.1: bare `cyrius test` is unreliable in CI — the
        # released-tarball toolchain exits with "No .tcyr files found
        # in tests/tcyr/ or tests/" even when tests/*.tcyr is present
        # (different code path from the locally-installed cyrius).
        # Agora 1.0.0's CI hit the same issue at the same version
        # (`docs/development/roadmap.md` notes the explicit form is
        # known-good at 6.0.1). Pass the [build].test entry explicitly;
        # tests/cyrius-yeomans-descent.tcyr stays as the auto-discovered
        # secondary suite when bare `cyrius test` is invoked locally.
        run: cyrius test src/test.cyr
